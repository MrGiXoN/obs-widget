<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
}

/* PANEL */
.container {
  width: 820px;
  display: flex;
  gap: 20px;
}

/* KOLUMNY */
.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.3s;
}

/* LEADER */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.6);
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

/* ANIMACJA NOWEGO LIDERA */
.player.newLeader {
  animation: leaderEnter 0.8s ease;
}

@keyframes leaderEnter {
  0% { transform: scale(1); }
  30% { transform: scale(1.08); box-shadow: 0 0 25px gold; }
  100% { transform: scale(1); }
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* AVATAR */
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

/* RANK */
.rank {
  width: 28px;
  text-align: center;
  font-weight: bold;
  color: #aaa;
}

/* 🔥 NAME (BEBAS + NEON ANIMATION) */
.name {
  font-size: 16px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;

  background: linear-gradient(90deg, #ffffff, #ffd86b, #ffffff);
  background-size: 200% auto;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 4s linear infinite;
  transition: 0.3s;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.15);
}

/* animowany gradient */
@keyframes shine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* LEADER NAME (mocniejszy efekt) */
.player.top1 .name {
  font-size: 18px;
  letter-spacing: 2px;
  animation: shine 2.5s linear infinite;
  text-shadow:
    0 0 8px rgba(255,215,0,0.8),
    0 0 20px rgba(255,215,0,0.4);
}

/* POINTS */
.points {
  font-weight: bold;
  font-size: 16px;
  color: #facc15;
}

/* UPDATE */
.player.updated {
  animation: flash 0.4s;
}

@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};
let lastLeader = null;

function animateNumber(el, start, end) {
  const duration = 300;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

function renderColumn(players) {
  return players.map((p,i) => `
    <div class="player ${p.rank===1?'top1':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>
      <div class="points">${p.points}</div>
    </div>
  `).join("");
}

async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => ({
    name: r.c[0]?.v || "",
    points: r.c[1]?.v || 0,
    avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
  }));

  players.sort((a,b) => b.points - a.points);
  players.forEach((p,i) => p.rank = i+1);

  const col1 = players.slice(0,4);
  const col2 = players.slice(4,8);

  document.getElementById("col1").innerHTML = renderColumn(col1);
  document.getElementById("col2").innerHTML = renderColumn(col2);

  // nowy lider
  if (players[0] && players[0].name !== lastLeader) {
    const el = document.querySelector(`[data-name="${players[0].name}"]`);
    if (el) {
      el.classList.add("newLeader");
      setTimeout(() => el.classList.remove("newLeader"), 800);
    }
    lastLeader = players[0].name;
  }

  // animacja punktów
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    const pointsEl = el.querySelector(".points");

    if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
      el.classList.add("updated");
      animateNumber(pointsEl, lastData[p.name], p.points);
      setTimeout(() => el.classList.remove("updated"), 400);
    }

    lastData[p.name] = p.points;
  });
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
