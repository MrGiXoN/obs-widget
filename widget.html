<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
}

/* PANEL */
.container {
  width: 400px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* TITLE */
.title {
  font-size: 15px;
  margin-bottom: 12px;
  font-weight: 600;
  color: #facc15;
  letter-spacing: 1px;
}

/* PLAYER CARD */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
  transition: 0.3s;
}

/* HOVER subtle */
.player:hover {
  background: rgba(255,255,255,0.05);
}

/* TOP 1 */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.6);
  box-shadow: 
    0 0 15px rgba(255,215,0,0.4),
    inset 0 0 10px rgba(255,215,0,0.1);
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* AVATAR */
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px; /* bardziej TFT niż kółko */
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

/* RANK */
.rank {
  width: 24px;
  text-align: center;
  font-weight: bold;
  color: #aaa;
}

/* NAME */
.name {
  font-size: 14px;
}

/* POINTS */
.points {
  font-weight: bold;
  font-size: 16px;
  color: #facc15;
}

/* ZMIANA */
.player.updated {
  animation: flash 0.4s;
}

@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">
  <div class="title">Tactician Master Series</div>
  <div id="board">Loading...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

function animateNumber(el, start, end) {
  const duration = 300;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => ({
    name: r.c[0]?.v || "",
    points: r.c[1]?.v || 0,
    avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
  }));

  players.sort((a,b) => b.points - a.points);

  const board = document.getElementById("board");

  board.innerHTML = players.map((p,i) => `
    <div class="player ${i===0?'top1':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${i+1}</span>
        <span class="name">${p.name}</span>
      </div>
      <div class="points">${p.points}</div>
    </div>
  `).join("");

  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    const pointsEl = el.querySelector(".points");

    if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
      el.classList.add("updated");
      animateNumber(pointsEl, lastData[p.name], p.points);
      setTimeout(() => el.classList.remove("updated"), 400);
    }

    lastData[p.name] = p.points;
  });
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
