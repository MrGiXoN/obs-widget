<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
  overflow: hidden;
}

/* 🔥 MNIEJSZY OVERLAY */
.container {
  width: 520px;
  display: flex;
  gap: 14px;
  transform: scale(0.95);
  transform-origin: top left;
}

.column {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 8px 10px;
  margin: 6px 0;

  border-radius: 8px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);

  transition: transform 0.3s ease;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 6px;
}

.rank {
  width: 22px;
  text-align: center;
  color: #aaa;
  font-size: 12px;
}

/* NAME */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
}

/* POINTS */
.points {
  font-weight: bold;
  font-size: 14px;
  color: #facc15;
}

/* 🥇 TOP 1 */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.9);
  box-shadow: 0 0 18px rgba(255,215,0,0.6);
  animation: topPulse 1.6s infinite ease-in-out;
}

@keyframes topPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* SHINE TOP1 */
.player.top1 .name {
  background: linear-gradient(90deg, #fff, #ffd86b, #fff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 2s linear infinite;
}

@keyframes shine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* 👑 20+ */
.crown {
  opacity: 0;
  margin: 0 6px;
}

.player.achieved20 .crown {
  opacity: 1;
}

/* 🏆 WIN */
.player.win {
  border: 1px solid #ffd700;
  box-shadow: 0 0 30px rgba(255,215,0,0.9);
}

/* animacja zmiany */
.player.flash {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastLeader = null;
let winTriggered = {};

/* CONFETTI */
function launchConfetti() {
  for (let i = 0; i < 18; i++) {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.width = "6px";
    c.style.height = "10px";
    c.style.background = "#ffd700";
    c.style.zIndex = 9999;
    document.body.appendChild(c);

    let y = 0;
    const fall = setInterval(() => {
      y += 5;
      c.style.top = y + "px";
      if (y > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 16);
  }
}

/* LOAD */
async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => {
    const val = (r.c[1]?.v + "").trim();

    return {
      name: r.c[0]?.v || "",
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png",
      isWin: val.toUpperCase() === "WIN",
      points: isNaN(Number(val)) ? 0 : Number(val)
    };
  });

  players.sort((a,b) => {
    if (a.isWin && !b.isWin) return -1;
    if (!a.isWin && b.isWin) return 1;
    return b.points - a.points;
  });

  players.forEach((p,i) => p.rank = i+1);

  render(players.slice(0,4), "col1");
  render(players.slice(4,8), "col2");

  /* TOP1 */
  const leader = players[0]?.name;

  if (leader && leader !== lastLeader) {
    const el = document.querySelector(`[data-name="${leader}"]`);
    if (el) {
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 300);
    }
    lastLeader = leader;
  }

  /* WIN */
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    const pointsEl = el.querySelector(".points");

    if (p.isWin) {
      el.classList.add("win");

      if (!winTriggered[p.name]) {
        winTriggered[p.name] = true;
        launchConfetti();
      }

      pointsEl.textContent = "🏆 WIN";
      return;
    }

    if (p.points >= 20) {
      el.classList.add("achieved20");
    }

    pointsEl.textContent = p.points;
  });
}

/* RENDER */
function render(players, colId) {
  const container = document.getElementById(colId);
  container.innerHTML = "";

  players.forEach(p => {
    const el = document.createElement("div");
    el.className = "player";
    el.dataset.name = p.name;

    el.innerHTML = `
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>

      <div style="display:flex; align-items:center;">
        <span class="crown">👑</span>
        <span class="points">${p.isWin ? "🏆 WIN" : p.points}</span>
      </div>
    `;

    if (p.rank === 1) el.classList.add("top1");

    container.appendChild(el);
  });
}

loadData();
setInterval(loadData, 2500);

</script>

</body>
</html>
