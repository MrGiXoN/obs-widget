<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: Inter, Segoe UI, sans-serif;
  background: transparent;
  color: #eaeaf0;
}

/* PANEL */
.container {
  width: 360px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(15, 17, 25, 0.65);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.05);
}

/* TITLE */
.title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.6;
  margin-bottom: 10px;
}

/* PLAYER ROW */
.player {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: transform 0.4s ease;
}

/* usuń border ostatniego */
.player:last-child {
  border-bottom: none;
}

/* TOP 1 */
.player.top1 {
  background: rgba(255,255,255,0.04);
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* AVATAR */
.avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  object-fit: cover;
}

/* RANK */
.rank {
  width: 22px;
  text-align: right;
  font-size: 12px;
  opacity: 0.5;
}

/* NAME */
.name {
  font-size: 14px;
}

/* POINTS */
.points {
  font-size: 14px;
  font-weight: 600;
}

/* subtle change */
.player.updated {
  animation: flash 0.4s;
}

@keyframes flash {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}
</style>
</head>

<body>
<div class="container">
  <div class="title">Ranking</div>
  <div id="board">Loading...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

function animateNumber(el, start, end) {
  const duration = 300;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => ({
    name: r.c[0]?.v || "",
    points: r.c[1]?.v || 0,
    avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
  }));

  players.sort((a,b) => b.points - a.points);

  const board = document.getElementById("board");

  board.innerHTML = players.map((p,i) => `
    <div class="player ${i===0?'top1':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${i+1}</span>
        <span class="name">${p.name}</span>
      </div>
      <div class="points">${p.points}</div>
    </div>
  `).join("");

  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    const pointsEl = el.querySelector(".points");

    if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
      el.classList.add("updated");
      animateNumber(pointsEl, lastData[p.name], p.points);
      setTimeout(() => el.classList.remove("updated"), 300);
    }

    lastData[p.name] = p.points;
  });
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
