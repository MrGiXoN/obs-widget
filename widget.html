<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
}

/* PANEL */
.container {
  width: 820px;
  display: flex;
  gap: 20px;
}

/* KOLUMNY */
.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.3s;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* AVATAR */
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

/* RANK */
.rank {
  width: 28px;
  text-align: center;
  font-weight: bold;
  color: #aaa;
}

/* =========================
   NAME (BEBAS FIX + STABILIZACJA)
========================= */
.name {
  font-size: 16px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;

  line-height: 1;
  position: relative;
  top: 1px;

  color: #eaeaf0;
}

/* =========================
   TOP 1 STYLE
========================= */
.player.top1 .name {
  font-size: 18px;
  letter-spacing: 2px;

  background: linear-gradient(90deg, #fff, #ffd86b, #fff);
  background-size: 200% auto;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation: shine 2.5s linear infinite;

  text-shadow:
    0 0 8px rgba(255,215,0,0.9),
    0 0 20px rgba(255,215,0,0.6),
    0 0 30px rgba(255,215,0,0.4);
}

@keyframes shine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* =========================
   🔥 WYPRZEDZENIE ANIMATION
========================= */
.player.overtake {
  animation: goldFlash 0.9s ease;
}

@keyframes goldFlash {
  0% {
    box-shadow: 0 0 0 rgba(255,215,0,0);
    transform: scale(1);
  }
  30% {
    box-shadow: 0 0 25px rgba(255,215,0,0.8);
    transform: scale(1.05);
  }
  100% {
    box-shadow: 0 0 0 rgba(255,215,0,0);
    transform: scale(1);
  }
}

/* POINTS */
.points {
  font-weight: bold;
  font-size: 16px;
  color: #facc15;
}

/* UPDATE */
.player.updated {
  animation: flash 0.4s;
}

@keyframes flash {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* TOP1 border */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.6);
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}
</style>
</head>

<body>
<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};
let lastLeader = null;

function animateNumber(el, start, end) {
  const duration = 300;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

function renderColumn(players) {
  return players.map(p => `
    <div class="player ${p.rank===1?'top1':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>
      <div class="points">${p.points}</div>
    </div>
  `).join("");
}

async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => ({
    name: r.c[0]?.v || "",
    points: r.c[1]?.v || 0,
    avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
  }));

  players.sort((a,b) => b.points - a.points);
  players.forEach((p,i) => p.rank = i+1);

  const col1 = players.slice(0,4);
  const col2 = players.slice(4,8);

  document.getElementById("col1").innerHTML = renderColumn(col1);
  document.getElementById("col2").innerHTML = renderColumn(col2);

  /* =========================
     🔥 FIXED OVERTAKE LOGIC
  ========================= */
  const newLeader = players[0]?.name;
  const oldLeader = lastLeader;

  if (newLeader && newLeader !== oldLeader) {

    const newEl = document.querySelector(`[data-name="${newLeader}"]`);
    if (newEl) {
      newEl.classList.add("overtake");
      setTimeout(() => newEl.classList.remove("overtake"), 900);
    }

    if (oldLeader) {
      const oldEl = document.querySelector(`[data-name="${oldLeader}"]`);
      if (oldEl) {
        oldEl.classList.add("overtake");
        setTimeout(() => oldEl.classList.remove("overtake"), 900);
      }
    }

    lastLeader = newLeader;
  }

  /* POINTS ANIMATION */
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    const pointsEl = el.querySelector(".points");

    if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
      el.classList.add("updated");
      animateNumber(pointsEl, lastData[p.name], p.points);
      setTimeout(() => el.classList.remove("updated"), 400);
    }

    lastData[p.name] = p.points;
  });
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
