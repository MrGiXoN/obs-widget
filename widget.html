<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
}

.container {
  width: 820px;
  display: flex;
  gap: 20px;
}

.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.3s;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
}

.rank {
  width: 28px;
  text-align: center;
  color: #aaa;
}

/* NAME */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.5px;
  position: relative;
  top: 1px;
}

/* POINTS */
.points {
  font-weight: bold;
  color: #facc15;
}

/* WIN STYLE */
.player.win {
  border: 1px solid #ffd700;
  box-shadow: 0 0 30px rgba(255,215,0,0.9);
  animation: winPulse 1s infinite alternate;
}

@keyframes winPulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.03); }
}

/* POWERUP */
.player.powerup {
  animation: powerUp 0.9s ease;
}

@keyframes powerUp {
  0% { transform: scale(1); }
  40% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,215,0,0.8); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastLeader = null;
let winTriggered = {};

/* CONFETTI */
function launchConfetti() {
  const end = Date.now() + 1200;

  (function frame() {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.width = "6px";
    c.style.height = "10px";
    c.style.background = ["#ffd700","#fff","#ffcc00"][Math.floor(Math.random()*3)];
    c.style.zIndex = 9999;
    document.body.appendChild(c);

    let fall = setInterval(() => {
      c.style.top = (parseFloat(c.style.top) + 5) + "px";
      if (parseFloat(c.style.top) > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 16);

    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

/* LOAD DATA */
async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => {
    const val = r.c[1]?.v;

    const isWin = (val + "").toUpperCase() === "WIN";
    const points = isWin ? 0 : Number(val) || 0;

    return {
      name: r.c[0]?.v || "",
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png",
      isWin,
      points
    };
  });

  players.sort((a,b) => b.points - a.points);
  players.forEach((p,i) => p.rank = i+1);

  document.getElementById("col1").innerHTML = render(players.slice(0,4));
  document.getElementById("col2").innerHTML = render(players.slice(4,8));

  /* LEADER ANIMATION */
  const newLeader = players[0]?.name;

  if (newLeader && newLeader !== lastLeader) {
    const el = document.querySelector(`[data-name="${newLeader}"]`);
    if (el) {
      el.classList.add("powerup");
      setTimeout(() => el.classList.remove("powerup"), 900);
    }
    lastLeader = newLeader;
  }

  /* WIN LOGIC */
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    if (p.isWin) {
      el.classList.add("win");

      if (!winTriggered[p.name]) {
        winTriggered[p.name] = true;
        launchConfetti();
      }
    }
  });
}

/* RENDER */
function render(players) {
  return players.map(p => `
    <div class="player ${p.rank===1?'top1':''} ${p.isWin?'win':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>

      <div class="points">
        ${p.isWin ? "🏆 WIN" : p.points}
      </div>
    </div>
  `).join("");
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
