<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
  overflow: hidden;
}

.container {
  width: 820px;
  display: flex;
  gap: 20px;
}

.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
  min-height: 500px;
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);

  transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1),
              box-shadow 0.6s,
              opacity 0.6s;
  will-change: transform;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
}

.rank {
  width: 28px;
  text-align: center;
  color: #aaa;
}

/* NAME */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.5px;
}

/* POINTS */
.points {
  font-weight: bold;
  color: #facc15;
}

/* 🥇 TOP1 */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.9);
  box-shadow: 0 0 30px rgba(255,215,0,0.6);
}

/* NAME SHINE */
.player.top1 .name {
  background: linear-gradient(90deg, #fff, #ffd86b, #fff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 2s linear infinite;
}

@keyframes shine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* 👑 CORONA */
.crown {
  opacity: 0;
  margin: 0 6px;
}

.player.achieved20 .crown {
  opacity: 1;
}

/* 🏆 WIN */
.player.win {
  border: 1px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,1);
}

/* MOVE ANIMATION BOOST */
.player.moving {
  z-index: 10;
  transform: scale(1.03);
}
</style>
</head>

<body>
<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

/* CONFETTI */
function launchConfetti() {
  const end = Date.now() + 1200;

  (function frame() {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.width = "6px";
    c.style.height = "10px";
    c.style.background = ["#ffd700","#fff","#ffcc00"][Math.floor(Math.random()*3)];
    c.style.zIndex = 9999;
    document.body.appendChild(c);

    let fall = setInterval(() => {
      c.style.top = (parseFloat(c.style.top) + 5) + "px";
      if (parseFloat(c.style.top) > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 16);

    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

/* LOAD */
async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => {
    const val = (r.c[1]?.v + "").trim();

    return {
      name: r.c[0]?.v || "",
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png",
      isWin: val.toUpperCase() === "WIN",
      points: isNaN(Number(val)) ? 0 : Number(val)
    };
  });

  /* SORT */
  players.sort((a,b) => {
    if (a.isWin && !b.isWin) return -1;
    if (!a.isWin && b.isWin) return 1;
    return b.points - a.points;
  });

  players.forEach((p,i) => p.rank = i+1);

  /* F1 ANIMATION (FLIP TECHNIQUE) */
  const oldEls = {};
  document.querySelectorAll(".player").forEach(el => {
    const name = el.dataset.name;
    oldEls[name] = el.getBoundingClientRect();
  });

  document.getElementById("col1").innerHTML = render(players.slice(0,4));
  document.getElementById("col2").innerHTML = render(players.slice(4,8));

  requestAnimationFrame(() => {
    document.querySelectorAll(".player").forEach(el => {
      const name = el.dataset.name;
      const newPos = el.getBoundingClientRect();
      const oldPos = oldEls[name];

      if (oldPos) {
        const dx = oldPos.left - newPos.left;
        const dy = oldPos.top - newPos.top;

        el.style.transform = `translate(${dx}px, ${dy}px) scale(1)`;
        el.classList.add("moving");

        requestAnimationFrame(() => {
          el.style.transition = "transform 0.6s cubic-bezier(0.2,0.8,0.2,1)";
          el.style.transform = "";
        });

        setTimeout(() => el.classList.remove("moving"), 600);
      }
    });
  });

  /* WIN */
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    if (p.isWin && !lastData[p.name]) {
      launchConfetti();
    }

    lastData[p.name] = p.isWin;
  });
}

/* RENDER */
function render(players) {
  return players.map(p => `
    <div class="player ${p.rank===1?'top1':''} ${p.isWin?'win':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>

      <div style="display:flex; align-items:center;">
        <span class="crown">👑</span>
        <span class="points">${p.isWin ? "🏆 WIN" : p.points}</span>
      </div>
    </div>
  `).join("");
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
