<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
}

.container {
  width: 820px;
  display: flex;
  gap: 20px;
}

.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.3s;
  position: relative;
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
}

.rank {
  width: 28px;
  text-align: center;
  color: #aaa;
}

/* NAME */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.5px;
}

/* POINTS */
.points {
  font-weight: bold;
  color: #facc15;
}

/* =======================
   🥇 TOP 1 (STABILNY PULS)
======================= */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.9);
  box-shadow: 0 0 25px rgba(255,215,0,0.6);
  animation: topPulse 1.6s ease-in-out infinite;
  transform-origin: center;
  will-change: transform, box-shadow;
}

@keyframes topPulse {
  0% {
    transform: translateZ(0) scale(1);
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
  }
  50% {
    transform: translateZ(0) scale(1.03);
    box-shadow: 0 0 35px rgba(255,215,0,0.9);
  }
  100% {
    transform: translateZ(0) scale(1);
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
  }
}

/* TOP1 NAME SHINE */
.player.top1 .name {
  background: linear-gradient(90deg, #fff, #ffd86b, #fff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 2s linear infinite;
}

@keyframes shine {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

/* 👑 CORONA (STATYCZNA) */
.crown {
  opacity: 0;
  margin: 0 6px;
}

.player.achieved20 .crown {
  opacity: 1;
}

/* 🏆 WIN */
.player.win {
  border: 1px solid #ffd700;
  box-shadow: 0 0 40px rgba(255,215,0,1);
}
</style>
</head>

<body>

<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let winTriggered = {};
let lastLeader = null;

/* CONFETTI */
function launchConfetti() {
  const end = Date.now() + 1200;

  (function frame() {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.width = "6px";
    c.style.height = "10px";
    c.style.background = "#ffd700";
    c.style.zIndex = 9999;
    document.body.appendChild(c);

    let y = 0;
    const fall = setInterval(() => {
      y += 5;
      c.style.top = y + "px";
      if (y > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 16);

    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

/* LOAD DATA */
async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => {
    const val = (r.c[1]?.v + "").trim();

    return {
      name: r.c[0]?.v || "",
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png",
      isWin: val.toUpperCase() === "WIN",
      points: isNaN(Number(val)) ? 0 : Number(val)
    };
  });

  /* SORT */
  players.sort((a,b) => {
    if (a.isWin && !b.isWin) return -1;
    if (!a.isWin && b.isWin) return 1;
    return b.points - a.points;
  });

  players.forEach((p,i) => p.rank = i+1);

  updateColumn("col1", players.slice(0,4));
  updateColumn("col2", players.slice(4,8));

  /* TOP1 + WIN */
  const leader = players[0]?.name;

  if (leader && leader !== lastLeader) {
    const el = document.querySelector(`[data-name="${leader}"]`);
    if (el) {
      el.classList.add("powerup");
      setTimeout(() => el.classList.remove("powerup"), 800);
    }
    lastLeader = leader;
  }

  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    if (p.isWin && !winTriggered[p.name]) {
      winTriggered[p.name] = true;
      launchConfetti();
    }
  });
}

/* SAFE UPDATE (NO ANIMATION RESET) */
function updateColumn(id, players) {
  const container = document.getElementById(id);

  const existing = new Map();
  container.querySelectorAll(".player").forEach(el => {
    existing.set(el.dataset.name, el);
  });

  players.forEach(p => {
    let el = existing.get(p.name);

    if (!el) {
      el = document.createElement("div");
      el.className = "player";
      el.dataset.name = p.name;

      el.innerHTML = `
        <div class="left">
          <img class="avatar" src="${p.avatar}">
          <span class="rank">#${p.rank}</span>
          <span class="name">${p.name}</span>
        </div>

        <div style="display:flex; align-items:center;">
          <span class="crown">👑</span>
          <span class="points"></span>
        </div>
      `;

      container.appendChild(el);
    }

    container.appendChild(el); // reorder bez resetu

    el.querySelector(".rank").textContent = "#" + p.rank;

    const pointsEl = el.querySelector(".points");

    if (p.isWin) {
      el.classList.add("win");
      pointsEl.textContent = "🏆 WIN";
    } else {
      pointsEl.textContent = p.points;
    }

    if (p.rank === 1) {
      el.classList.add("top1");
    } else {
      el.classList.remove("top1");
    }

    if (p.points >= 20) {
      el.classList.add("achieved20");
    }
  });
}

loadData();
setInterval(loadData, 2500);

</script>

</body>
</html>
