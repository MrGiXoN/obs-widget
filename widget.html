<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: white;
}

/* 🔥 GLASS PANEL */
.container {
  width: 380px;
  padding: 16px;
  border-radius: 20px;
  background: rgba(15, 15, 25, 0.55);
  backdrop-filter: blur(14px);
  box-shadow: 
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.03);
}

/* 🏆 tytuł */
.title {
  font-size: 18px;
  margin-bottom: 10px;
  opacity: 0.85;
  font-weight: 600;
}

/* 👤 PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  margin: 6px 0;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  transition: transform 0.5s ease, background 0.3s ease;
}

/* hover subtle */
.player:hover {
  background: rgba(255,255,255,0.08);
}

/* 🥇 TOP 1 */
.player.top1 {
  background: linear-gradient(90deg, #f7c948, #fadb5f);
  color: black;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

/* left side */
.left {
  display: flex;
  align-items: center;
}

/* avatar */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin-right: 8px;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
}

/* rank */
.rank {
  margin-right: 8px;
  opacity: 0.7;
  font-weight: bold;
}

/* points */
.points {
  font-weight: bold;
  font-size: 16px;
}

/* 🔥 zmiana */
.player.updated {
  animation: flash 0.5s;
}

@keyframes flash {
  0% { transform: scale(1); background: rgba(255,255,255,0.2); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">
  <div class="title">🏆 Ranking</div>
  <div id="board">Ładowanie...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

// 🎯 animacja liczby
function animateNumber(el, start, end) {
  const duration = 400;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

// 🔥 FLIP
function applyFLIP(oldPositions, newElements) {
  newElements.forEach(el => {
    const first = oldPositions.get(el.dataset.name);
    const last = el.getBoundingClientRect();
    if (!first) return;

    const dx = first.left - last.left;
    const dy = first.top - last.top;

    el.style.transform = `translate(${dx}px, ${dy}px)`;

    requestAnimationFrame(() => {
      el.style.transition = "transform 0.5s ease";
      el.style.transform = "";
    });
  });
}

async function loadData() {
  try {
    const res = await fetch(URL + "&t=" + Date.now());
    const text = await res.text();

    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    const rows = json.table.rows;

    let players = rows.map(r => ({
      name: r.c[0]?.v || "",
      points: r.c[1]?.v || 0,
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
    }));

    players.sort((a,b) => b.points - a.points);

    const board = document.getElementById("board");

    // 📸 stare pozycje
    const oldPositions = new Map();
    document.querySelectorAll(".player").forEach(el => {
      oldPositions.set(el.dataset.name, el.getBoundingClientRect());
    });

    // 🧱 render
    board.innerHTML = players.map((p, i) => `
      <div class="player ${i===0?'top1':''}" data-name="${p.name}">
        <div class="left">
          <img class="avatar" src="${p.avatar}">
          <span class="rank">#${i+1}</span>
          ${p.name}
        </div>
        <div class="points">${p.points}</div>
      </div>
    `).join("");

    const newEls = document.querySelectorAll(".player");

    applyFLIP(oldPositions, newEls);

    // 🎯 animacje punktów
    players.forEach(p => {
      const el = document.querySelector(`[data-name="${p.name}"]`);
      if (!el) return;

      const pointsEl = el.querySelector(".points");

      if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
        el.classList.add("updated");

        animateNumber(
          pointsEl,
          lastData[p.name],
          p.points
        );

        setTimeout(() => el.classList.remove("updated"), 500);
      }

      lastData[p.name] = p.points;
    });

  } catch (err) {
    console.error(err);
    document.getElementById("board").innerHTML = "Błąd ładowania danych";
  }
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
