<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: Inter, Segoe UI, sans-serif;
  background: transparent;
  color: #eaeaf0;
}

/* 🔥 PANEL */
.container {
  width: 380px;
  padding: 18px;
  border-radius: 18px;
  background: rgba(10, 10, 20, 0.7);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(170, 0, 255, 0.2);
  box-shadow: 
    0 0 40px rgba(140, 0, 255, 0.25),
    inset 0 0 30px rgba(255,255,255,0.02);
}

/* 🏆 TITLE */
.title {
  font-size: 16px;
  letter-spacing: 1px;
  margin-bottom: 12px;
  font-weight: 600;
  color: #c084fc;
}

/* 👤 ROW */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 6px;
  border-bottom: 1px solid rgba(140,0,255,0.15);
  transition: 0.3s;
}

.player:last-child {
  border-bottom: none;
}

/* 🥇 TOP 1 */
.player.top1 {
  color: #facc15;
  text-shadow: 0 0 8px rgba(255,215,0,0.6);
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* AVATAR */
.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(140,0,255,0.4);
}

/* RANK */
.rank {
  width: 24px;
  text-align: right;
  opacity: 0.5;
  font-size: 12px;
}

/* NAME */
.name {
  font-size: 14px;
}

/* POINTS */
.points {
  font-weight: 700;
  font-size: 15px;
}

/* ✨ zmiana */
.player.updated {
  animation: glow 0.4s;
}

@keyframes glow {
  0% { opacity: 0.5; }
  50% { text-shadow: 0 0 12px #a855f7; }
  100% { opacity: 1; }
}
</style>
</head>

<body>
<div class="container">
  <div class="title">Tactician Master Series</div>
  <div id="board">Loading...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

function animateNumber(el, start, end) {
  const duration = 300;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => ({
    name: r.c[0]?.v || "",
    points: r.c[1]?.v || 0,
    avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png"
  }));

  players.sort((a,b) => b.points - a.points);

  const board = document.getElementById("board");

  board.innerHTML = players.map((p,i) => `
    <div class="player ${i===0?'top1':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${i+1}</span>
        <span class="name">${p.name}</span>
      </div>
      <div class="points">${p.points}</div>
    </div>
  `).join("");

  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    const pointsEl = el.querySelector(".points");

    if (lastData[p.name] !== undefined && lastData[p.name] !== p.points) {
      el.classList.add("updated");
      animateNumber(pointsEl, lastData[p.name], p.points);
      setTimeout(() => el.classList.remove("updated"), 400);
    }

    lastData[p.name] = p.points;
  });
}

loadData();
setInterval(loadData, 2500);
</script>
</body>
</html>
