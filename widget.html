<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: white;
}

/* 🌫️ GLASS UI */
.container {
  width: 360px;
  padding: 15px;
  border-radius: 16px;
  background: rgba(20, 20, 30, 0.55);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* 👤 PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  margin: 6px 0;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  transition: all 0.4s ease;
}

/* 🔥 highlight zmiany */
.player.updated {
  animation: flash 0.6s;
}

@keyframes flash {
  0% { transform: scale(1); background: rgba(255,255,255,0.2); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* 🥇 TOP 1 */
.player.top1 {
  background: linear-gradient(90deg, #f7c948, #fadb5f);
  color: black;
  font-weight: bold;
}

.left {
  display: flex;
  align-items: center;
}

.rank {
  margin-right: 8px;
  opacity: 0.7;
  font-weight: bold;
}

.points {
  font-weight: bold;
  transition: all 0.3s ease;
}
</style>
</head>

<body>
<div class="container">
  <div id="board">Ładowanie...</div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let lastData = {};

// 🎯 animacja liczby
function animateNumber(el, start, end) {
  const duration = 400;
  const startTime = performance.now();

  function update(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const value = Math.floor(start + (end - start) * progress);
    el.textContent = value;

    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
}

async function loadData() {
  try {
    const res = await fetch(URL);
    const text = await res.text();

    // 🔥 Google Sheets JSON fix
    const json = JSON.parse(
      text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
    );

    const rows = json.table.rows;

    let players = rows.map(r => ({
      name: r.c[0]?.v || "",
      points: r.c[1]?.v || 0
    }));

    players.sort((a,b) => b.points - a.points);

    const board = document.getElementById("board");

    // 🧱 pierwsze renderowanie
    if (board.children.length === 0 || board.innerHTML.includes("Ładowanie")) {
      board.innerHTML = players.map((p, i) => `
        <div class="player ${i===0?'top1':''}" data-name="${p.name}">
          <div class="left">
            <span class="rank">#${i+1}</span>
            ${p.name}
          </div>
          <div class="points">${p.points}</div>
        </div>
      `).join("");

      players.forEach(p => lastData[p.name] = p.points);
      return;
    }

    // 🔄 update bez resetu UI
    players.forEach((p, i) => {
      const el = document.querySelector(`[data-name="${p.name}"]`);
      if (!el) return;

      const pointsEl = el.querySelector(".points");

      // 🔥 zmiana punktów
      if (lastData[p.name] !== p.points) {
        el.classList.add("updated");

        animateNumber(
          pointsEl,
          lastData[p.name] || 0,
          p.points
        );

        setTimeout(() => el.classList.remove("updated"), 600);
      }

      // 🥇 ranking
      el.querySelector(".rank").textContent = `#${i+1}`;
      el.classList.toggle("top1", i === 0);
    });

    players.forEach(p => lastData[p.name] = p.points);

  } catch (err) {
    console.error(err);
    document.getElementById("board").innerHTML =
      "Błąd ładowania danych";
  }
}

loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
