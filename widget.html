<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #eaeaf0;
  overflow: hidden;
}

/* FIX: stabilny layout */
.container {
  width: 820px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

.column {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  background: rgba(12, 14, 20, 0.85);
  border: 1px solid rgba(255, 215, 0, 0.15);

  /* 🔥 FIX: blokuje rozciąganie */
  height: 420px;
  overflow: hidden;
}

/* PLAYER */
.player {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 12px;
  margin: 8px 0;

  border-radius: 10px;
  background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.9));
  border: 1px solid rgba(255,255,255,0.06);

  transition: transform 0.4s ease, box-shadow 0.4s ease;
  box-sizing: border-box; /* 🔥 FIX */
}

/* LEFT */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 6px;
  flex-shrink: 0;
}

.rank {
  width: 28px;
  text-align: center;
  color: #aaa;
  flex-shrink: 0;
}

/* NAME */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.5px;
  white-space: nowrap;
}

/* POINTS */
.points {
  font-weight: bold;
  color: #facc15;
  flex-shrink: 0;
}

/* 🥇 TOP1 */
.player.top1 {
  border: 1px solid rgba(255,215,0,0.9);
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* 👑 CORONA (STATIC) */
.crown {
  opacity: 0;
  margin: 0 6px;
}

.player.achieved20 .crown {
  opacity: 1;
}

/* 🏆 WIN */
.player.win {
  border: 1px solid #ffd700;
  box-shadow: 0 0 25px rgba(255,215,0,0.9);
}

/* smooth movement placeholder */
.player.moving {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">
  <div class="column" id="col1"></div>
  <div class="column" id="col2"></div>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/1_h0Qgc6WVnrTBJMoVLVxsPjko9-tqztPyxEOj-AYbZI/gviz/tq?tqx=out:json";

let winTriggered = new Set();

/* CONFETTI */
function launchConfetti() {
  for (let i = 0; i < 20; i++) {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-10px";
    c.style.width = "6px";
    c.style.height = "10px";
    c.style.background = "#ffd700";
    c.style.zIndex = 9999;

    document.body.appendChild(c);

    let y = 0;
    const fall = setInterval(() => {
      y += 5;
      c.style.top = y + "px";
      if (y > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 16);
  }
}

/* LOAD */
async function loadData() {
  const res = await fetch(URL + "&t=" + Date.now());
  const text = await res.text();

  const json = JSON.parse(
    text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1)
  );

  const rows = json.table.rows;

  let players = rows.map(r => {
    const val = (r.c[1]?.v + "").trim();

    return {
      name: r.c[0]?.v || "",
      avatar: r.c[2]?.v || "https://i.imgur.com/4M34hi2.png",
      isWin: val.toUpperCase() === "WIN",
      points: isNaN(Number(val)) ? 0 : Number(val)
    };
  });

  /* SORT */
  players.sort((a,b) => {
    if (a.isWin && !b.isWin) return -1;
    if (!a.isWin && b.isWin) return 1;
    return b.points - a.points;
  });

  players.forEach((p,i) => p.rank = i+1);

  renderColumn("col1", players.slice(0,4));
  renderColumn("col2", players.slice(4,8));

  /* WIN LOGIC */
  players.forEach(p => {
    const el = document.querySelector(`[data-name="${p.name}"]`);
    if (!el) return;

    if (p.isWin && !winTriggered.has(p.name)) {
      winTriggered.add(p.name);
      launchConfetti();
    }
  });
}

/* SAFE RENDER (NO DOM BREAKING) */
function renderColumn(id, players) {
  const container = document.getElementById(id);

  container.innerHTML = players.map(p => `
    <div class="player ${p.rank===1?'top1':''} ${p.isWin?'win':''}" data-name="${p.name}">
      <div class="left">
        <img class="avatar" src="${p.avatar}">
        <span class="rank">#${p.rank}</span>
        <span class="name">${p.name}</span>
      </div>

      <div style="display:flex; align-items:center;">
        <span class="crown">👑</span>
        <span class="points">${p.isWin ? "🏆 WIN" : p.points}</span>
      </div>
    </div>
  `).join("");

  /* 20+ AFTER RENDER */
  container.querySelectorAll(".player").forEach(el => {
    const pointsText = el.querySelector(".points").textContent;
    const val = parseInt(pointsText);

    if (!isNaN(val) && val >= 20) {
      el.classList.add("achieved20");
    }
  });
}

loadData();
setInterval(loadData, 2500);

</script>

</body>
</html>
